<!DOCTYPE html>
<html>
<head>
    <title>Doctor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-blue-700 mb-6 text-center">MedicareAI Dashboard</h1>
        
        <div id="login-form">
            <input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-4 rounded">
            <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Sign In</button>
        </div>

        <div id="queue" class="hidden">
            <h2 id="welcome" class="font-bold mb-4"></h2>
            <div id="patient-list" class="space-y-2"></div>
            <button onclick="location.reload()" class="mt-4 text-xs text-gray-400">Logout</button>
        </div>
    </div>

   <script>
    const API = "https://your-app-name.onrender.com"; // Your Render URL

    // 1. Login Logic
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res = await fetch(`${API}/api/doctors/login`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password})
        });
        const data = await res.json();
        if (data.token) {
            localStorage.setItem('token', data.token);
            renderUI();
        } else { alert("Login failed!"); }
    }

    // 2. Fetch the Queue
    async function loadPatients() {
        const res = await fetch(`${API}/api/doctor/dashboard`, {
            headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
        });
        const queue = await res.json();
        const list = document.getElementById('patient-list');
        list.innerHTML = queue.map(appt => `
            <div class="p-4 border-b flex justify-between items-center">
                <span>${appt.start_time} - ${appt.patient_phone}</span>
                <button onclick="markDone(${appt.id})" class="bg-green-500 text-white px-3 py-1 rounded">Done</button>
            </div>
        `).join('') || "No patients today.";
    }

    // 3. Remove Patient from Queue
    async function markDone(appointmentId) {
        await fetch(`${API}/api/appointments/complete`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            },
            body: JSON.stringify({ appointmentId })
        });
        loadPatients(); // Refresh list
    }

    function renderUI() {
        if (localStorage.getItem('token')) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('queue').classList.remove('hidden');
            loadPatients();
        }
    }
    renderUI();
</script>
</body>
</html>
