<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedicareAI | Doctor Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 font-sans">
    <div class="flex justify-between items-center mb-4">
    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Queue</h3>
    <button onclick="downloadCSV()" class="text-[10px] font-bold bg-slate-200 text-slate-600 px-3 py-1 rounded-md hover:bg-indigo-600 hover:text-white transition">
        📥 DOWNLOAD CSV
    </button>
</div>
    <div id="app" class="max-w-md mx-auto bg-white shadow-2xl rounded-3xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-600">🏥 Swift MD</h1>
            <p id="view-title" class="text-slate-400 font-medium">Doctor Access Dashboard</p>
        </div>

        <div id="auth-view">
            <div class="flex mb-6 bg-slate-100 p-1 rounded-xl">
                <button onclick="toggleAuth('login')" id="btn-login" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-indigo-600">Login</button>
                <button onclick="toggleAuth('register')" id="btn-register" class="flex-1 py-2 rounded-lg font-bold text-sm text-slate-500">Sign Up</button>
            </div>

            <form id="auth-form" class="space-y-4">
                <div id="reg-fields" class="hidden space-y-4">
                    <input id="name" type="text" placeholder="Full Name (e.g. Dr. Smith)" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                    <input id="specialty" type="text" placeholder="Specialty (e.g. Dentist)" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                    <input id="fee" type="number" placeholder="Consultation Fee (KES)" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                    <input id="phone" type="text" placeholder="WhatsApp Phone (254...)" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                </div>
                <input id="email" type="email" placeholder="Email Address" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                <input id="password" type="password" placeholder="Password" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
                <button type="button" onclick="handleAuth()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition">Continue</button>
            </form>
        </div>

        <div id="queue-view" class="hidden space-y-6">
            <div class="flex justify-between items-center border-b pb-4">
                <h2 id="doc-name" class="font-bold text-slate-700"></h2>
                <button onclick="logout()" class="text-xs font-bold text-red-500 uppercase tracking-widest">Logout</button>
            </div>
            <div id="patient-list" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        const API = "https://medicareai-4av2.onrender.com; 
        let mode = 'login';

        function toggleAuth(m) {
            mode = m;
            document.getElementById('reg-fields').classList.toggle('hidden', m === 'login');
            document.getElementById('btn-login').className = m === 'login' ? 'flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-indigo-600' : 'flex-1 py-2 rounded-lg font-bold text-sm text-slate-500';
            document.getElementById('btn-register').className = m === 'register' ? 'flex-1 py-2 rounded-lg font-bold text-sm bg-white shadow text-indigo-600' : 'flex-1 py-2 rounded-lg font-bold text-sm text-slate-500';
        }

        async function downloadCSV() {
    const res = await fetch(`${API}/api/doctor/dashboard`, {
        headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
    });
    const data = await res.json();
    
    if (data.length === 0) return alert("No data to download today.");

    // Define CSV headers
    let csvContent = "Time,Patient Phone,Status\n";

    // Add rows
    data.forEach(row => {
        csvContent += `${row.start_time},${row.patient_phone},${row.status}\n`;
    });

    // Create a download link
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    link.setAttribute("download", `MedicareAI_Report_${new Date().toISOString().split('T')[0]}.csv`);
    document.body.appendChild(link);
    
    link.click();
    document.body.removeChild(link);
}
        async function handleAuth() {
            const endpoint = mode === 'login' ? '/api/doctors/login' : '/api/doctors/register';
            const body = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                name: document.getElementById('name').value,
                specialty: document.getElementById('specialty').value,
                phone_number: document.getElementById('phone').value,
                fee: document.getElementById('fee').value
            };

            const API_URL = 'https://medicareai-backend.onrender.com'; // Use your actual Render URL

document.querySelector('.continue-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    
    const doctorData = {
        name: document.querySelector('input[placeholder="Willy Weyru"]').value,
        specialty: document.querySelector('input[placeholder="lab"]').value,
        fee: document.querySelector('input[placeholder="1500"]').value,
        phone: document.querySelector('input[placeholder="+254723503988"]').value,
        email: document.querySelector('input[placeholder="mugwe88@gmail.com"]').value,
        password: document.querySelector('input[type="password"]').value
    };

    try {
        // 1. Initial Signup (Status: PENDING)
        const response = await fetch(`${API_URL}/api/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(doctorData)
        });

        if (response.ok) {
            // 2. Show OTP Modal
            document.getElementById('otpModal').style.display = 'flex';
        } else {
            alert("Signup failed. Check if email/phone already exists.");
        }
    } catch (err) {
        console.error("Error connecting to server:", err);
    }
});
            const res = await fetch(`${API}${endpoint}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('name', data.doctor.name);
                showDashboard();
            } else if (mode === 'register' && res.ok) {
                alert("Registration successful! Please login.");
                toggleAuth('login');
            } else {
                alert(data.error || "Something went wrong.");
            }
        }

        function showDashboard() {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('queue-view').classList.remove('hidden');
            document.getElementById('doc-name').innerText = "Dr. " + localStorage.getItem('name');
            loadQueue();
        }

        async function loadQueue() {
            const res = await fetch(`${API}/api/doctor/dashboard`, {
                headers: {'Authorization': `Bearer ${localStorage.getItem('token')}`}
            });
            const queue = await res.json();
            const container = document.getElementById('patient-list');
            container.innerHTML = queue.length ? queue.map(a => `
                <div class="p-4 bg-slate-50 border rounded-2xl flex justify-between items-center">
                    <div><p class="font-bold text-slate-700">${a.start_time}</p><p class="text-xs text-slate-400">${a.patient_phone}</p></div>
                    <button onclick="markDone(${a.id})" class="bg-emerald-500 text-white text-[10px] font-black px-3 py-2 rounded-lg">DONE</button>
                </div>
            `).join('') : "<p class='text-center text-slate-300 py-10'>No patients waiting.</p>";
        }

        async function markDone(id) {
            await fetch(`${API}/api/appointments/complete`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}`},
                body: JSON.stringify({ appointmentId: id })
            });
            loadQueue();
        }

        function logout() { localStorage.clear(); location.reload(); }
        if (localStorage.getItem('token')) showDashboard();
    </script>

    <div id="otpModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:15px; text-align:center; width:90%; max-width:400px;">
        <h3>Verify Your Identity</h3>
        <p>A 6-digit code has been sent to your email and phone.</p>
        <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6" style="width:100%; padding:10px; margin:15px 0; border:1px solid #ccc; border-radius:8px; text-align:center; font-size:1.2rem;">
        <button id="verifyBtn" style="background:#5D5FEF; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; width:100%;">Verify & Complete Signup</button>
    </div>
</div>
</body>
</html>
